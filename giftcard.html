<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Piece Birthday Card</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rye&family=Caveat:wght@700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #2c1a0e;
            background-image: url("C:/Users/darshan babu/OneDrive/Pictures/Saved Pictures/WhatsApp Image 2026-04-16 at 9.45.39 AM.jpeg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            perspective: 1500px;
        }

        .card-container {
            width: 360px;
            height: 620px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .card-container.open {
            transform: rotateY(180deg);
        }

        .card-face {
            width: 100%;
            height: 100%;
            position: absolute;
            backface-visibility: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ----- FRONT: Golden Wanted Poster ----- */
        .card-front {
            /* Golden parchment color */
            background: #eacb88;
            background-image: radial-gradient(circle at center, transparent 0%, rgba(139, 69, 19, 0.3) 100%);
            border: 12px solid #bd8c42;
            /* Golden border */
            padding: 15px;
            align-items: center;
            text-align: center;
            z-index: 2;
        }

        /* Corner accents for the poster */
        .card-front::before,
        .card-front::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid #4a2511;
            border-radius: 50%;
        }

        .card-front::before {
            top: 5px;
            left: 5px;
        }

        .card-front::after {
            top: 5px;
            right: 5px;
        }

        .wanted-header {
            font-family: 'Rye', cursive;
            color: #4a2511;
            font-size: 3.2rem;
            line-height: 1;
            margin-top: 10px;
            letter-spacing: 2px;
        }

        .dead-alive {
            font-family: 'Times New Roman', serif;
            font-weight: bold;
            color: #4a2511;
            letter-spacing: 4px;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .wanted-image {
            width: 100%;
            height: 280px;
            border: 3px solid #4a2511;
            background-color: #d1b17a;
            /* Fallback color if no image */
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 10px;
            position: relative;
            overflow: hidden;
        }

        .wanted-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: sepia(0.5) contrast(1.1);
            /* Vintage effect */
        }

        .wanted-image span {
            position: absolute;
            color: #4a2511;
            font-weight: bold;
            opacity: 0.5;
            padding: 10px;
        }

        .name {
            font-family: 'Rye', cursive;
            color: #4a2511;
            font-size: 2.2rem;
            line-height: 1;
            margin: 5px 0;
            text-transform: uppercase;
        }

        .bounty {
            font-family: 'Times New Roman', serif;
            font-weight: bold;
            color: #4a2511;
            font-size: 1.6rem;
            margin-bottom: 15px;
        }

        .open-btn {
            background-color: #8c2a2a;
            color: #fcebbb;
            border: 2px solid #4a2511;
            padding: 8px 15px;
            font-family: 'Times New Roman', serif;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.5);
            transition: transform 0.2s;
            border-radius: 5px;
            position: relative;
            z-index: 100;
        }

        .open-btn:hover {
            transform: scale(1.05);
            background-color: #a63131;
        }

        /* ----- BACK: Treasure Map ----- */
        .card-back {
            background: #eacb88;
            background-image: radial-gradient(circle at center, transparent 0%, rgba(139, 69, 19, 0.4) 100%);
            transform: rotateY(180deg);
            border: 8px solid #8e622b;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
        }

        /* Treasure path decorations */
        .map-path {
            position: absolute;
            top: 60px;
            left: 30px;
            width: 70%;
            height: 50%;
            border: 4px dashed #8e622b;
            border-color: transparent transparent #8e622b #8e622b;
            border-radius: 0 0 0 80px;
            z-index: 0;
            opacity: 0.6;
        }

        .x-marks {
            color: #c92a2a;
            font-family: 'Rye', cursive;
            font-size: 4rem;
            position: absolute;
            top: 20px;
            right: 30px;
            z-index: 1;
            transform: rotate(15deg);
        }

        .back-content {
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 40px;
        }

        .map-title {
            font-family: 'Rye', cursive;
            color: #8c2a2a;
            font-size: 2rem;
            margin-bottom: 15px;
            text-shadow: 1px 1px 0px rgba(0, 0, 0, 0.1);
        }

        .treasure-image {
            width: 140px;
            height: 140px;
            border: 4px solid #8e622b;
            border-radius: 50%;
            overflow: hidden;
            margin-bottom: 20px;
            background-color: #d1b17a;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
            position: relative;
        }

        .treasure-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .treasure-image span {
            position: absolute;
            color: #4a2511;
            font-weight: bold;
            opacity: 0.5;
            font-size: 0.8rem;
            text-align: center;
            padding: 5px;
        }

        .tanglish {
            font-family: 'Caveat', cursive;
            font-size: 1.6rem;
            color: #4a2511;
            font-weight: bold;
            line-height: 1.1;
            margin-bottom: 10px;
        }

        .punchline {
            font-family: 'Caveat', cursive;
            font-size: 1.5rem;
            color: #8c2a2a;
            font-weight: bold;
            line-height: 1.2;
        }

        /* Gold Coins Confetti Elements */
        .coin {
            position: absolute;
            width: 25px;
            height: 25px;
            background-color: gold;
            border: 2px solid #b8860b;
            border-radius: 50%;
            top: -30px;
            z-index: 10;
            opacity: 0;
            box-shadow: inset 0 0 5px #b8860b, 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        /* The inner circle of a coin */
        .coin::before {
            content: '฿';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #b8860b;
            font-weight: bold;
            font-family: sans-serif;
            font-size: 14px;
        }

        .show-coin {
            animation: fall linear forwards;
        }

        @keyframes fall {
            0% {
                opacity: 1;
                transform: translateY(-10vh) rotateY(0deg);
            }

            100% {
                opacity: 0;
                transform: translateY(110vh) rotateY(720deg);
            }
        }
    </style>
</head>

<body>

    <div class="card-container" id="giftCard">

        <!-- ----- FRONT COVER: WANTED POSTER ----- -->
        <div class="card-face card-front">
            <h1 class="wanted-header">WANTED</h1>
            <div class="dead-alive">DEAD OR ALIVE</div>

            <div class="wanted-image">
                <!-- Insert your uploaded profile image here -->
                <img src="C:/Users/darshan babu/OneDrive/Pictures/Saved Pictures/IMG-20260127-WA0019.jpg.jpeg"
                    alt="Wanted Portrait" onerror="this.style.display='none'">
            </div>

            <h2 class="name">VISWA .V.POOKIE</h2>
            <div class="bounty">฿ 5,000,000</div>

            <button class="open-btn" onclick="openCard(event)">Open the Treasure! 👇</button>
        </div>

        <!-- ----- INSIDE CARD: TREASURE MAP ----- -->
        <div class="card-face card-back">
            <div class="map-path"></div>
            <div class="x-marks">X</div>

            <div class="back-content">
                <h2 class="map-title">Happy Birthday Mapla! 🗺️</h2>

                <div class="treasure-image">
                    <!-- Insert your other uploaded image here -->
                    <img src="C:\Users\darshan babu\OneDrive\Pictures\Saved Pictures\Snapchat-1693006551.jpg.jpeg"
                        alt="Treasure Portrait" onerror="this.style.display='none'">
                </div>

                <p class="tanglish">"Nalla nanban illa endral paavam..."</p>
                <p class="punchline">...aana unna mathiri aal kooda suthurathu atha vida romba paavam! 🤣🤦‍♂️</p>
                <p class="tanglish" style="margin-top: 5px; font-size: 1.25rem;">"Unaku gift vera kekudha?.. unaku naane
                    periya gift dhan.. muditu treat vai!" 🎁😎</p>
            </div>
        </div>

    </div>

    <script>
        let hasOpened = false;

        function openCard(event) {
            event.stopPropagation();
            toggleCard();
        }

        document.getElementById('giftCard').addEventListener('click', function () {
            toggleCard();
        });

        function toggleCard() {
            const card = document.getElementById('giftCard');
            card.classList.toggle('open');

            if (card.classList.contains('open') && !hasOpened) {
                fireGoldCoins();
                hasOpened = true;
            } else if (!card.classList.contains('open')) {
                hasOpened = false;
            }
        }

        // Drop Gold Coins (Treasure)
        function fireGoldCoins() {
            for (let i = 0; i < 50; i++) {
                let coin = document.createElement('div');
                coin.classList.add('coin', 'show-coin');
                coin.style.left = Math.random() * 100 + 'vw';

                // Randomize sizes and speed
                let size = (Math.random() * 15 + 15) + 'px';
                coin.style.width = size;
                coin.style.height = size;

                coin.style.animationDuration = (Math.random() * 2 + 2) + 's';
                coin.style.animationDelay = Math.random() * 0.5 + 's';

                document.body.appendChild(coin);

                setTimeout(() => {
                    coin.remove();
                }, 4000);
            }
        }
    </script>
</body>

</html>
